site_name: tap-ixc
site_description: Sincronize dados da API IXC Soft para PostgreSQL — checkpointing, retry, circuit breaker e observabilidade nativa.
site_url: https://arktnld.github.io/tap-ixc/
repo_url: https://github.com/arktnld/tap-ixc
repo_name: arktnld/tap-ixc
edit_uri: edit/master/docs/
copyright: MIT — arktnld

theme:
  name: material
  language: pt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - toc.follow
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arktnld/tap-ixc
      name: tap-ixc no GitHub
  generator: false

nav:
  - Início: index.md
  - Tutorial:
      - Primeiros passos: getting-started.md
      - 10 minutos com tap-ixc: tutorial.md
  - Guias (how-to):
      - Adicionar um stream: streams.md
      - Sync incremental e validação: incremental-and-validation.md
      - Deploy (Airflow/cron): deployment.md
  - Referência:
      - Configuração: configuration.md
      - CLI: cli.md
      - API Python: python-api.md
      - API (autodoc): api-reference.md
  - Explicação:
      - Arquitetura: concepts.md
      - Monitoramento: monitoring.md
  - Sobre:
      - Changelog: changelog.md
      - Contribuindo: contributing.md
      - Code review: code-review.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang: pt
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            docstring_style: google
